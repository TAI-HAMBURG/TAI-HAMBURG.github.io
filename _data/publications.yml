- title: 'Mind the Inclusivity Gap: Multilingual Gender-Neutral Translation Evaluation
    with mGeNTE'
  date: 2025
  abstract: Avoiding the propagation of undue (binary) gender inferences and default
    masculine language remains a key challenge towards inclusive multilingual technologies,
    particularly when translating into languages with extensive gendered morphology.
    Gender-neutral translation (GNT) represents a linguistic strategy towards fairer
    communication across languages. However, research on GNT is limited to a few resources
    and language pairs. To address this gap, we introduce mGeNTE, an expert-curated
    resource, and use it to conduct the first systematic multilingual evaluation of
    inclusive translation with state-of-the-art instruction-following language models
    (LMs). Experiments on en-es/de/it/el reveal that while models can recognize when
    neutrality is appropriate, they cannot consistently produce neutral translations,
    limiting their usability. To probe this behavior, we enrich our evaluation with
    interpretability analyses that identify task-relevant features and offer initial
    insights into the internal dynamics of LM-based GNT.
  venue: Conference on Empirical Methods in Natural Language Processing
  type: conference
  authors: Beatrice Savoldi, Eleonora Cupin, Manjinder Thind, Anne Lauscher, Andrea
    Piergentili, L. Bentivogli
  pdf: https://arxiv.org/abs/2501.09409
- title: 'SHADES: Towards a Multilingual Assessment of Stereotypes in Large Language
    Models'
  date: 2025
  abstract: 'Large Language Models (LLMs), the bedrock of many “artificial intelligence”
    (AI) applications, are known to reproduce social biases present in their training
    data. Yet resources to measure and control this issue are limited. Research identifying
    and mitigating stereotype biases have primarily been concentrated around English,
    lagging the rapid advancement of LLMs in multilingual settings. To help further
    advance the ability to address stereotype bias in AI systems, we introduce a new
    multi-lingual dataset: SHADES . 1 Designed for examining culturally-specific stereotypes
    that may be learned by LLMs, SHADES includes over 300 stereotypes from 37 regions,
    translated across 16 languages and annotated with multiple features to aid multilingual
    stereotype analysis. All statements in all languages are paired with templates,
    to serve as a resource for unlimited'
  venue: North American Chapter of the Association for Computational Linguistics
  type: conference
  authors: Margaret Mitchellet al.
  pdf: https://doi.org/10.18653/v1/2025.naacl-long.600
- title: LazyReview A Dataset for Uncovering Lazy Thinking in NLP Peer Reviews
  date: 2025
  abstract: 'Peer review is a cornerstone of quality control in scientific publishing.
    With the increasing workload, the unintended use of `quick'' heuristics, referred
    to as lazy thinking, has emerged as a recurring issue compromising review quality.
    Automated methods to detect such heuristics can help improve the peer-reviewing
    process. However, there is limited NLP research on this issue, and no real-world
    dataset exists to support the development of detection tools. This work introduces
    LazyReview, a dataset of peer-review sentences annotated with fine-grained lazy
    thinking categories. Our analysis reveals that Large Language Models (LLMs) struggle
    to detect these instances in a zero-shot setting. However, instruction-based fine-tuning
    on our dataset significantly boosts performance by 10-20 performance points, highlighting
    the importance of high-quality training data. Furthermore, a controlled experiment
    demonstrates that reviews revised with lazy thinking feedback are more comprehensive
    and actionable than those written without such feedback. We will release our dataset
    and the enhanced guidelines that can be used to train junior reviewers in the
    community. (Code available here: https://github.com/UKPLab/acl2025-lazy-review)'
  venue: arXiv.org
  type: conference
  authors: Sukannya Purkayastha, Zhuang Li, Anne Lauscher, Lizhen Qu, Iryna Gurevych
  pdf: https://arxiv.org/abs/2504.11042
- title: 'Decision-Making with Deliberation: Meta-reviewing as a Document-grounded
    Dialogue'
  date: 2025
  abstract: 'Meta-reviewing is a pivotal stage in the peer-review process, serving
    as the final step in determining whether a paper is recommended for acceptance.
    Prior research on meta-reviewing has treated this as a summarization problem over
    review reports. However, complementary to this perspective, meta-reviewing is
    a decision-making process that requires weighing reviewer arguments and placing
    them within a broader context. Prior research has demonstrated that decision-makers
    can be effectively assisted in such scenarios via dialogue agents. In line with
    this framing, we explore the practical challenges for realizing dialog agents
    that can effectively assist meta-reviewers. Concretely, we first address the issue
    of data scarcity for training dialogue agents by generating synthetic data using
    Large Language Models (LLMs) based on a self-refinement strategy to improve the
    relevance of these dialogues to expert domains. Our experiments demonstrate that
    this method produces higher-quality synthetic data and can serve as a valuable
    resource towards training meta-reviewing assistants. Subsequently, we utilize
    this data to train dialogue agents tailored for meta-reviewing and find that these
    agents outperform \emph{off-the-shelf} LLM-based assistants for this task. Finally,
    we apply our agents in real-world meta-reviewing scenarios and confirm their effectiveness
    in enhancing the efficiency of meta-reviewing.\footnote{Code available at: https://github.com/UKPLab/eacl2026-meta-review-as-dialog'
  venue: arXiv.org
  type: conference
  authors: Sukannya Purkayastha, Nils Dycke, Anne Lauscher, Iryna Gurevych
  pdf: https://arxiv.org/abs/2508.05283
- title: 'Aligned Probing: Relating Toxic Behavior and Model Internals'
  date: 2025
  abstract: We introduce aligned probing, a novel interpretability framework that
    aligns the behavior of language models (LMs), based on their outputs, and their
    internal representations (internals). Using this framework, we examine over 20
    OLMo, Llama, and Mistral models, bridging behavioral and internal perspectives
    for toxicity for the first time. Our results show that LMs strongly encode information
    about the toxicity level of inputs and subsequent outputs, particularly in lower
    layers. Focusing on how unique LMs differ offers both correlative and causal evidence
    that they generate less toxic output when strongly encoding information about
    the input toxicity. We also highlight the heterogeneity of toxicity, as model
    behavior and internals vary across unique attributes such as Threat. Finally,
    four case studies analyzing detoxification, multi-prompt evaluations, model quantization,
    and pre-training dynamics underline the practical impact of aligned probing with
    further concrete insights. Our findings contribute to a more holistic understanding
    of LMs, both within and beyond the context of toxicity.
  venue: arXiv.org
  type: conference
  authors: Andreas Waldis, Vagrant Gautam, Anne Lauscher, Dietrich Klakow, Iryna Gurevych
  pdf: https://arxiv.org/abs/2503.13390
- title: How Much Do LLMs Hallucinate across Languages? On Realistic Multilingual
    Estimation of LLM Hallucination
  date: 2025
  abstract: In the age of misinformation, hallucination - the tendency of Large Language
    Models (LLMs) to generate non-factual or unfaithful responses - represents the
    main risk for their global utility. Despite LLMs becoming increasingly multilingual,
    the vast majority of research on detecting and quantifying LLM hallucination are
    (a) English-centric and (b) focus on machine translation (MT) and summarization,
    tasks that are less common in realistic settings than open information seeking.
    In contrast, we aim to quantify the extent of LLM hallucination across languages
    in knowledge-intensive long-form question answering (LFQA). To this end, we train
    a multilingual hallucination detection model and conduct a large-scale study across
    30 languages and 6 open-source LLM families. We start from an English hallucination
    detection dataset and rely on MT to translate-train a detection model. We also
    manually annotate gold data for five high-resource languages; we then demonstrate,
    for these languages, that the estimates of hallucination rates are similar between
    silver (LLM-generated) and gold test sets, validating the use of silver data for
    estimating hallucination rates for other languages. For the final rates estimation,
    we build open-domain QA dataset for 30 languages with LLM-generated prompts and
    Wikipedia articles as references. Our analysis shows that LLMs, in absolute terms,
    hallucinate more tokens in high-resource languages due to longer responses, but
    that the actual hallucination rates (i.e., normalized for length) seems uncorrelated
    with the sizes of languages'digital footprints. We also find that smaller LLMs
    hallucinate more, and significantly, LLMs with broader language support display
    higher hallucination rates.
  venue: Conference on Empirical Methods in Natural Language Processing
  type: conference
  authors: Saad Obaid ul Islam, Anne Lauscher, Goran Glavas
  pdf: https://arxiv.org/abs/2502.12769
- title: GIMMICK - Globally Inclusive Multimodal Multitask Cultural Knowledge Benchmarking
  date: 2025
  abstract: Large Vision-Language Models (LVLMs) have recently gained attention due
    to their distinctive performance and broad applicability. While it has been previously
    shown that their efficacy in usage scenarios involving non-Western contexts falls
    short, existing studies are limited in scope, covering just a narrow range of
    cultures, focusing exclusively on a small number of cultural aspects, or evaluating
    a limited selection of models on a single task only. Towards globally inclusive
    LVLM research, we introduce GIMMICK, an extensive multimodal benchmark designed
    to assess a broad spectrum of cultural knowledge across 144 countries representing
    six global macro-regions. GIMMICK comprises six tasks built upon three new datasets
    that span 728 unique cultural events or facets on which we evaluated 20 LVLMs
    and 11 LLMs, including five proprietary and 26 open-weight models of all sizes.
    We systematically examine (1) regional cultural biases, (2) the influence of model
    size, (3) input modalities, and (4) external cues. Our analyses reveal strong
    biases toward Western cultures across models and tasks and highlight strong correlations
    between model size and performance, as well as the effectiveness of multimodal
    input and external geographic cues. We further find that models have more knowledge
    of tangible than intangible aspects (e.g., food vs. rituals) and that they excel
    in recognizing broad cultural origins but struggle with a more nuanced understanding.
  venue: arXiv.org
  type: conference
  authors: Florian Schneider, Carolin Holtermann, Chris Biemann, Anne Lauscher
