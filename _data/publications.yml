- title: 'From Zero to Hero: On the Limitations of Zero-Shot Language Transfer with
    Multilingual Transformers'
  date: 2020
  abstract: Massively multilingual transformers (MMTs) pretrained via language modeling
    (e.g., mBERT, XLM-R) have become a default paradigm for zero-shot language transfer
    in NLP, offering unmatched transfer performance. Current evaluations, however,
    verify their efficacy in transfers (a) to languages with sufficiently large pretraining
    corpora, and (b) between close languages. In this work, we analyze the limitations
    of downstream language transfer with MMTs, showing that, much like cross-lingual
    word embeddings, they are substantially less effective in resource-lean scenarios
    and for distant languages. Our experiments, encompassing three lower-level tasks
    (POS tagging, dependency parsing, NER) and two high-level tasks (NLI, QA), empirically
    correlate transfer performance with linguistic proximity between source and target
    languages, but also with the size of target language corpora used in MMT pretraining.
    Most importantly, we demonstrate that the inexpensive few-shot transfer (i.e.,
    additional fine-tuning on a few target-language instances) is surprisingly effective
    across the board, warranting more research efforts reaching beyond the limiting
    zero-shot conditions.
  venue: Conference on Empirical Methods in Natural Language Processing
  type: conference
  authors: Anne Lauscher, Vinit Ravishankar, Ivan Vulic, Goran Glavas
  pdf: https://www.duo.uio.no/bitstream/10852/102833/1/PhD-Ravishankar-2023.pdf
- title: Common Sense or World Knowledge? Investigating Adapter-Based Knowledge Injection
    into Pretrained Transformers
  date: 2020
  abstract: 'Following the major success of neural language models (LMs) such as BERT
    or GPT-2 on a variety of language understanding tasks, recent work focused on
    injecting (structured) knowledge from external resources into these models. While
    on the one hand, joint pre-training (i.e., training from scratch, adding objectives
    based on external knowledge to the primary LM objective) may be prohibitively
    computationally expensive, post-hoc fine-tuning on external knowledge, on the
    other hand, may lead to the catastrophic forgetting of distributional knowledge.
    In this work, we investigate models for complementing the distributional knowledge
    of BERT with conceptual knowledge from ConceptNet and its corresponding Open Mind
    Common Sense (OMCS) corpus, respectively, using adapter training. While overall
    results on the GLUE benchmark paint an inconclusive picture, a deeper analysis
    reveals that our adapter-based models substantially outperform BERT (up to 15-20
    performance points) on inference tasks that require the type of conceptual knowledge
    explicitly present in ConceptNet and OMCS. We also open source all our experiments
    and relevant code under: https://github.com/wluper/retrograph.'
  venue: Workshop on Knowledge Extraction and Integration for Deep Learning Architectures;
    Deep Learning Inside Out
  type: conference
  authors: Anne Lauscher, Olga Majewska, Leonardo F. R. Ribeiro, Iryna Gurevych, N.
    Rozanov, Goran Glavavs
  pdf: https://www.aclweb.org/anthology/2020.deelio-1.5.pdf
- title: 'AraWEAT: Multidimensional Analysis of Biases in Arabic Word Embeddings'
  date: 2020
  abstract: 'Recent work has shown that distributional word vector spaces often encode
    human biases like sexism or racism. In this work, we conduct an extensive analysis
    of biases in Arabic word embeddings by applying a range of recently introduced
    bias tests on a variety of embedding spaces induced from corpora in Arabic. We
    measure the presence of biases across several dimensions, namely: embedding models
    (Skip-Gram, CBOW, and FastText) and vector sizes, types of text (encyclopedic
    text, and news vs. user-generated content), dialects (Egyptian Arabic vs. Modern
    Standard Arabic), and time (diachronic analyses over corpora from different time
    periods). Our analysis yields several interesting findings, e.g., that implicit
    gender bias in embeddings trained on Arabic news corpora steadily increases over
    time (between 2007 and 2017). We make the Arabic bias specifications (AraWEAT)
    publicly available.'
  venue: Workshop on Arabic Natural Language Processing
  type: conference
  authors: Anne Lauscher, Rafik Takieddin, Simone Paolo Ponzetto, Goran Glavas
  pdf: https://arxiv.org/abs/2011.01575
- title: The OpenCitations Data Model
  date: 2020
  abstract: A variety of schemas and ontologies are currently used for the machine-readable
    description of bibliographic entities and citations. This diversity, and the reuse
    of the same ontology terms with different nuances, generates inconsistencies in
    data. Adoption of a single data model would facilitate data integration tasks
    regardless of the data supplier or context application. In this paper we present
    the OpenCitations Data Model (OCDM), a generic data model for describing bibliographic
    entities and citations, developed using Semantic Web technologies. We also evaluate
    the effective reusability of OCDM according to ontology evaluation practices,
    mention existing users of OCDM, and discuss the use and impact of OCDM in the
    wider open science community.
  venue: International Workshop on the Semantic Web
  type: conference
  authors: Marilena Daquino, S. Peroni, D. Shotton, Giovanni Colavizza, Behnam Ghavimi,
    Anne Lauscher, Philipp Mayr, Matteo Romanello, P. Zumstein
  pdf: https://pure.uva.nl/ws/files/62346819/Daquino2020_Chapter_TheOpenCitationsDataModel.pdf
