- title: The Curious Case of Factual (Mis)Alignment between LLMs' Short- and Long-Form
    Answers
  date: 2025
  abstract: Large language models (LLMs) can correctly answer"When was Einstein born?"yet
    fail to provide the same date when writing about Einstein's life revealing a fundamental
    inconsistency in how models access factual knowledge across task complexities.
    While models display impressive accuracy on factual question-answering benchmarks,
    the reliability gap between simple and complex queries remains poorly understood,
    eroding their trustworthiness. In this work, we introduce Short-Long Form Alignment
    for Factual Question Answering (SLAQ), a controlled evaluation framework that
    compares LLMs'answers to the same factual questions asked (a) in isolation (short)
    vs. (b) integrated into complex queries (long). Looking at 16 LLMs across 600
    queries, we find a systematic misalignment of answers to the corresponding short
    and long queries. We further uncover position-dependent accuracy loss and momentum
    effects where consecutive correct or incorrect answers create self-reinforcing
    patterns. Through mechanistic analysis, we find that aligned facts activate overlapping
    model internals, and that metrics based on mechanistic similarity can predict
    short-long answer alignment with up to 78% accuracy. Our work establishes factual
    consistency over query complexity as an important aspect of LLMs'trustworthiness
    and challenges current evaluation practices, which implicitly assume that good
    performance for simple factual queries implies reliability in more complex knowledge-seeking
    tasks too.
  venue: arXiv.org
  type: conference
  authors: Saad Obaid Ul Islam, Anne Lauscher, Goran Glavavs
  pdf: https://arxiv.org/abs/2510.11218
- title: 'Centurio: On Drivers of Multilingual Ability of Large Vision-Language Model'
  date: 2025
  abstract: 'Most Large Vision-Language Models (LVLMs) to date are trained predominantly
    on English data, which makes them struggle to understand non-English input and
    fail to generate output in the desired target language. Existing efforts mitigate
    these issues by adding multilingual training data, but do so in a largely ad-hoc
    manner, lacking insight into how different training mixes tip the scale for different
    groups of languages. In this work, we present a comprehensive investigation into
    the training strategies for massively multilingual LVLMs. First, we conduct a
    series of multi-stage experiments spanning 13 downstream vision-language tasks
    and 43 languages, systematically examining: (1) the number of training languages
    that can be included without degrading English performance and (2) optimal language
    distributions of pre-training as well as (3) instruction-tuning data. Further,
    we (4) investigate how to improve multilingual text-in-image understanding, and
    introduce a new benchmark for the task. Surprisingly, our analysis reveals that
    one can (i) include as many as 100 training languages simultaneously (ii) with
    as little as 25-50\% of non-English data, to greatly improve multilingual performance
    while retaining strong English performance. We further find that (iii) including
    non-English OCR data in pre-training and instruction-tuning is paramount for improving
    multilingual text-in-image understanding. Finally, we put all our findings together
    and train Centurio, a 100-language LVLM, offering state-of-the-art performance
    in an evaluation covering 14 tasks and 56 languages.'
  venue: Annual Meeting of the Association for Computational Linguistics
  type: conference
  authors: Gregor Geigle, Florian Schneider, Carolin Holtermann, Chris Biemann, Radu
    Timofte, Anne Lauscher, Goran Glavavs
  pdf: https://arxiv.org/abs/2501.05122
- title: 'Transforming Science with Large Language Models: A Survey on AI-assisted
    Scientific Discovery, Experimentation, Content Generation, and Evaluation'
  date: 2025
  abstract: With the advent of large multimodal language models, science is now at
    a threshold of an AI-based technological transformation. Recently, a plethora
    of new AI models and tools has been proposed, promising to empower researchers
    and academics worldwide to conduct their research more effectively and efficiently.
    This includes all aspects of the research cycle, especially (1) searching for
    relevant literature; (2) generating research ideas and conducting experimentation;
    generating (3) text-based and (4) multimodal content (e.g., scientific figures
    and diagrams); and (5) AI-based automatic peer review. In this survey, we provide
    an in-depth overview over these exciting recent developments, which promise to
    fundamentally alter the scientific research process for good. Our survey covers
    the five aspects outlined above, indicating relevant datasets, methods and results
    (including evaluation) as well as limitations and scope for future research. Ethical
    concerns regarding shortcomings of these tools and potential for misuse (fake
    science, plagiarism, harms to research integrity) take a particularly prominent
    place in our discussion. We hope that our survey will not only become a reference
    guide for newcomers to the field but also a catalyst for new AI-based initiatives
    in the area of"AI4Science".
