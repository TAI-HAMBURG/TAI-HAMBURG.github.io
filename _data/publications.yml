- title: 'Reviewing the Reviewer: Elevating Peer Review Quality through LLM-Guided
    Feedback'
  date: 2026
  abstract: Peer review is central to scientific quality, yet reliance on simple heuristics
    -- lazy thinking -- has lowered standards. Prior work treats lazy thinking detection
    as a single-label task, but review segments may exhibit multiple issues, including
    broader clarity problems, or specificity issues. Turning detection into actionable
    improvements requires guideline-aware feedback, which is currently missing. We
    introduce an LLM-driven framework that decomposes reviews into argumentative segments,
    identifies issues via a neurosymbolic module combining LLM features with traditional
    classifiers, and generates targeted feedback using issue-specific templates refined
    by a genetic algorithm. Experiments show our method outperforms zero-shot LLM
    baselines and improves review quality by up to 92.4\%. We also release LazyReviewPlus,
    a dataset of 1,309 sentences labeled for lazy thinking and specificity.
  venue: ''
  type: conference
  authors: Sukannya Purkayastha, Qile Wan, Anne Lauscher, Lizhen Qu, Iryna Gurevych
  pdf: https://arxiv.org/abs/2602.10118
- title: 'TempViz: On the Evaluation of Temporal Knowledge in Text-to-Image Models'
  date: 2026
  abstract: Time alters the visual appearance of entities in our world, like objects,
    places, and animals. Thus, for accurately generating contextually-relevant images,
    knowledge and reasoning about time can be crucial (e.g., for generating a landscape
    in spring vs. in winter). Yet, although substantial work exists on understanding
    and improving temporal knowledge in natural language processing, research on how
    temporal phenomena appear and are handled in text-to-image (T2I) models remains
    scarce. We address this gap with TempViz, the first data set to holistically evaluate
    temporal knowledge in image generation, consisting of 7.9k prompts and more than
    600 reference images. Using TempViz, we study the capabilities of five T2I models
    across five temporal knowledge categories. Human evaluation shows that temporal
    competence is generally weak, with no model exceeding 75% accuracy across categories.
    Towards larger-scale studies, we also examine automated evaluation methods, comparing
    several established approaches against human judgments. However, none of these
    approaches provides a reliable assessment of temporal cues - further indicating
    the pressing need for future research on temporal knowledge in T2I.
  venue: arXiv.org
  type: conference
  authors: Carolin Holtermann, Nina Krebs, Anne Lauscher
  pdf: https://arxiv.org/abs/2601.14951
- title: 'SoS: Analysis of Surface over Semantics in Multilingual Text-To-Image Generation'
  date: 2026
  abstract: Text-to-image (T2I) models are increasingly employed by users worldwide.
    However, prior research has pointed to the high sensitivity of T2I towards particular
    input languages - when faced with languages other than English (i.e., different
    surface forms of the same prompt), T2I models often produce culturally stereotypical
    depictions, prioritizing the surface over the prompt's semantics. Yet a comprehensive
    analysis of this behavior, which we dub Surface-over-Semantics (SoS), is missing.
    We present the first analysis of T2I models'SoS tendencies. To this end, we create
    a set of prompts covering 171 cultural identities, translated into 14 languages,
    and use it to prompt seven T2I models. To quantify SoS tendencies across models,
    languages, and cultures, we introduce a novel measure and analyze how the tendencies
    we identify manifest visually. We show that all but one model exhibit strong surface-level
    tendency in at least two languages, with this effect intensifying across the layers
    of T2I text encoders. Moreover, these surface tendencies frequently correlate
    with stereotypical visual depictions.
  venue: ''
  type: conference
  authors: Carolin Holtermann, Florian Schneider, Anne Lauscher
  pdf: https://arxiv.org/abs/2601.16803
- title: 'Around the World in 24 Hours: Probing LLM Knowledge of Time and Place'
  date: 2025
  abstract: Reasoning over time and space is essential for understanding our world.
    However, the abilities of language models in this area are largely unexplored
    as previous work has tested their abilities for logical reasoning in terms of
    time and space in isolation or only in simple or artificial environments. In this
    paper, we present the first evaluation of the ability of language models to jointly
    reason over time and space. To enable our analysis, we create GeoTemp, a dataset
    of 320k prompts covering 289 cities in 217 countries and 37 time zones. Using
    GeoTemp, we evaluate eight open chat models of three different model families
    for different combinations of temporal and geographic knowledge. We find that
    most models perform well on reasoning tasks involving only temporal knowledge
    and that overall performance improves with scale. However, performance remains
    constrained in tasks that require connecting temporal and geographical information.
    We do not find clear correlations of performance with specific geographic regions.
    Instead, we find a significant performance increase for location names with low
    model perplexity, suggesting their repeated occurrence during model training.
    We further demonstrate that their performance is heavily influenced by prompt
    formulation - a direct injection of geographical knowledge leads to performance
    gains, whereas, surprisingly, techniques like chain-of-thought prompting decrease
    performance on simpler tasks.
