- title: Agents of Discovery
  date: 2025
  abstract: 'The substantial data volumes encountered in modern particle physics and
    other domains of fundamental physics research allow (and require) the use of increasingly
    complex data analysis tools and workflows. While the use of machine learning (ML)
    tools for data analysis has recently proliferated, these tools are typically special-purpose
    algorithms that rely, for example, on encoded physics knowledge to reach optimal
    performance. In this work, we investigate a new and orthogonal direction: Using
    recent progress in large language models (LLMs) to create a team of agents --
    instances of LLMs with specific subtasks -- that jointly solve data analysis-based
    research problems in a way similar to how a human researcher might: by creating
    code to operate standard tools and libraries (including ML systems) and by building
    on results of previous iterations. If successful, such agent-based systems could
    be deployed to automate routine analysis components to counteract the increasing
    complexity of modern tool chains. To investigate the capabilities of current-generation
    commercial LLMs, we consider the task of anomaly detection via the publicly available
    and highly-studied LHC Olympics dataset. Several current models by OpenAI (GPT-4o,
    o4-mini, GPT-4.1, and GPT-5) are investigated and their stability tested. Overall,
    we observe the capacity of the agent-based system to solve this data analysis
    problem. The best agent-created solutions mirror the performance of human state-of-the-art
    results.'
  venue: arXiv.org
  type: conference
  authors: S. Diefenbacher, Anna Hallin, G. Kasieczka, Michael Krämer, Anne Lauscher,
    Tim Lukas
  pdf: https://arxiv.org/abs/2509.08535
- title: Detecting Hallucinations in Authentic LLM-Human Interactions
  date: 2025
  abstract: As large language models (LLMs) are increasingly applied in sensitive
    domains such as medicine and law, hallucination detection has become a critical
    task. Although numerous benchmarks have been proposed to advance research in this
    area, most of them are artificially constructed--either through deliberate hallucination
    induction or simulated interactions--rather than derived from genuine LLM-human
    dialogues. Consequently, these benchmarks fail to fully capture the characteristics
    of hallucinations that occur in real-world usage. To address this limitation,
    we introduce AuthenHallu, the first hallucination detection benchmark built entirely
    from authentic LLM-human interactions. For AuthenHallu, we select and annotate
    samples from genuine LLM-human dialogues, thereby providing a faithful reflection
    of how LLMs hallucinate in everyday user interactions. Statistical analysis shows
    that hallucinations occur in 31.4% of the query-response pairs in our benchmark,
    and this proportion increases dramatically to 60.0% in challenging domains such
    as Math&Number Problems. Furthermore, we explore the potential of using vanilla
    LLMs themselves as hallucination detectors and find that, despite some promise,
    their current performance remains insufficient in real-world scenarios.
  venue: arXiv.org
  type: conference
  authors: Yujie Ren, Niklas Gruhlke, Anne Lauscher
  pdf: https://arxiv.org/abs/2510.10539
- title: Large Language Models Discriminate Against Speakers of German Dialects
  date: 2025
  abstract: 'Dialects represent a significant component of human culture and are found
    across all regions of the world. In Germany, more than 40% of the population speaks
    a regional dialect (Adler and Hansen, 2022). However, despite cultural importance,
    individuals speaking dialects often face negative societal stereotypes. We examine
    whether such stereotypes are mirrored by large language models (LLMs). We draw
    on the sociolinguistic literature on dialect perception to analyze traits commonly
    associated with dialect speakers. Based on these traits, we assess the dialect
    naming bias and dialect usage bias expressed by LLMs in two tasks: an association
    task and a decision task. To assess a model''s dialect usage bias, we construct
    a novel evaluation corpus that pairs sentences from seven regional German dialects
    (e.g., Alemannic and Bavarian) with their standard German counterparts. We find
    that: (1) in the association task, all evaluated LLMs exhibit significant dialect
    naming and dialect usage bias against German dialect speakers, reflected in negative
    adjective associations; (2) all models reproduce these dialect naming and dialect
    usage biases in their decision making; and (3) contrary to prior work showing
    minimal bias with explicit demographic mentions, we find that explicitly labeling
    linguistic demographics--German dialect speakers--amplifies bias more than implicit
    cues like dialect usage.'
  venue: Conference on Empirical Methods in Natural Language Processing
  type: conference
  authors: Minh Duc Bui, Carolin Holtermann, Valentin Hofmann, Anne Lauscher, K. Wense
  pdf: https://arxiv.org/abs/2509.13835
- title: How Much Do LLMs Hallucinate across Languages? On Multilingual Estimation
    of LLM Hallucination in the Wild
  date: 2025
